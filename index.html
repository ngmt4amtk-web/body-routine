<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<link rel="manifest" href="manifest.json">
<title>Body Routine</title>
<style>
:root{
  --bg:#09090b;--c1:#18181b;--c2:#1f1f23;--bd:#27272a;
  --ac:#818cf8;--ac2:#6366f1;
  --t:#fafafa;--t2:#a1a1aa;--t3:#71717a;
  --g:#4ade80;--gbg:#4ade8012;--y:#fbbf24;--ybg:#fbbf2412;
  --r:#f87171;--b:#60a5fa;--bbg:#60a5fa12;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;line-height:1.5}
.screen{display:none;min-height:100dvh}.screen.active{display:flex;flex-direction:column}
button{font-family:inherit}

/* HOME */
.home{padding:20px 16px 40px;gap:14px}
.home h1{font-size:24px;font-weight:800;text-align:center;margin:12px 0 0;letter-spacing:-.5px}
.home .sub{text-align:center;color:var(--t3);font-size:12px;margin-bottom:4px}
.streak-bar{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--c1);border:1px solid var(--bd);border-radius:10px;
  padding:10px 16px;font-size:13px;color:var(--t2);
}
.streak-bar .num{font-size:20px;font-weight:800;color:var(--y)}
.streak-bar .fire{font-size:18px}
.week-dots{display:flex;gap:6px;justify-content:center;margin:2px 0}
.wdot{width:10px;height:10px;border-radius:50%;background:var(--bd)}
.wdot.done{background:var(--g)}
.wdot.today{outline:2px solid var(--ac);outline-offset:2px}
.rc{
  background:var(--c1);border:1px solid var(--bd);
  border-radius:14px;padding:16px;cursor:pointer;
  transition:transform .12s;display:flex;gap:14px;align-items:center;
}
.rc:active{transform:scale(.97)}
.ri{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ri.n{background:#7c3aed18}.ri.m{background:#f59e0b18}.ri.p{background:#06b6d418}.ri.w{background:#22c55e18}.ri.d{background:#f472b618}
.rf{flex:1}
.rf h3{font-size:15px;font-weight:700;margin-bottom:1px}
.rf .meta{font-size:12px;color:var(--t3)}
.rf .meta span{margin-right:8px}
.rc .arr{color:var(--t3);font-size:16px}

/* OVERVIEW */
.ov{padding:20px 16px 40px;gap:14px}
.ov-head{display:flex;align-items:center;gap:12px}
.ov-back{width:38px;height:38px;border-radius:10px;background:var(--c1);border:1px solid var(--bd);color:var(--t);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ov h2{font-size:20px;font-weight:800;flex:1}
.ov-info{font-size:12px;color:var(--t3);display:flex;gap:12px;margin-bottom:4px}
.ov-list{display:flex;flex-direction:column;gap:6px}
.ov-item{
  display:flex;align-items:center;gap:10px;
  background:var(--c1);border:1px solid var(--bd);border-radius:10px;
  padding:12px 14px;cursor:pointer;transition:transform .1s;font-size:13px;
}
.ov-item:active{transform:scale(.98)}
.ov-num{width:24px;height:24px;border-radius:50%;background:var(--ac2);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ov-item .name{flex:1;font-weight:600}
.ov-item .time{color:var(--t3);font-variant-numeric:tabular-nums}
.ov-item .side-r{color:var(--r);font-size:11px;font-weight:700}
.ov-item .side-l{color:var(--b);font-size:11px;font-weight:700}
.ov-item.opt{opacity:.7}
.ov-item.opt .name::after{content:' (任意)';color:var(--y);font-size:11px}
.ov-start{
  height:56px;border-radius:14px;border:none;
  background:var(--ac2);color:#fff;font-size:16px;font-weight:700;
  cursor:pointer;width:100%;margin-top:8px;transition:transform .1s;
}
.ov-start:active{transform:scale(.97)}

/* EXERCISE */
.ex{padding:0}
.ex-hd{
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--bd);
  position:sticky;top:0;background:var(--bg);z-index:10;
}
.ex-b{width:38px;height:38px;border-radius:10px;background:var(--c1);border:1px solid var(--bd);color:var(--t);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ex-t{font-size:13px;font-weight:600;flex:1;color:var(--t2)}
.ex-p{font-size:12px;color:var(--t3);font-variant-numeric:tabular-nums}
.pb{height:3px;background:var(--c1)}.pf{height:100%;background:var(--ac);transition:width .3s}

.ex-body{flex:1;padding:20px 16px 120px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}

.s-cat{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.s-name{font-size:21px;font-weight:800;line-height:1.25;margin-top:2px}
.s-badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700}
.badge.time{background:var(--c1);border:1px solid var(--bd);color:var(--ac)}
.badge.R{background:#f8717118;color:var(--r)}.badge.L{background:#60a5fa18;color:var(--b)}
.badge.both{background:#a78bfa18;color:#a78bfa}.badge.opt{background:var(--ybg);color:var(--y)}

/* Prep */
.prep{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:14px}
.prep h4{font-size:12px;font-weight:700;color:var(--t2);margin-bottom:6px}
.prep ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.prep li{font-size:13px;color:var(--t3);display:flex;align-items:center;gap:8px}
.prep li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ac);flex-shrink:0}

/* Pose diagram */
.pose{background:var(--c2);border:1px solid var(--bd);border-radius:12px;padding:14px;text-align:center}
.pose svg{max-width:100%;height:auto}
.pose .cap{font-size:11px;color:var(--t3);margin-top:6px;font-weight:600}
.pose-row{display:flex;gap:10px}
.pose-row .pose{flex:1}

/* Instructions */
.inst{background:var(--c1);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.inst-h{padding:12px 14px;font-size:13px;font-weight:700;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.inst-c{padding:14px}
.ns{display:flex;flex-direction:column;gap:10px}
.n1{display:flex;gap:10px;align-items:flex-start}
.nc{width:22px;height:22px;border-radius:50%;background:var(--ac2);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.nt{font-size:13px;line-height:1.65;color:var(--t2)}
.nt strong{color:var(--t);font-weight:600}

/* Tip boxes */
.tip{border-radius:10px;padding:11px 13px;font-size:12px;line-height:1.6;margin-top:2px}
.tip .tl{font-weight:700;margin-bottom:3px;display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.tip.feel{background:var(--gbg);border-left:3px solid var(--g);color:var(--g)}
.tip.warn{background:var(--ybg);border-left:3px solid var(--y);color:var(--y)}
.tip.why{background:var(--bbg);border-left:3px solid var(--b);color:var(--b)}
.tip strong{font-weight:700}

/* Timer */
.tcard{background:var(--c1);border:1px solid var(--bd);border-radius:16px;padding:20px;text-align:center}

/* Countdown overlay */
.countdown{
  position:fixed;inset:0;background:#000d;z-index:50;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;
}
.cd-num{font-size:96px;font-weight:900;color:var(--ac);animation:cdPop .4s ease-out}
.cd-label{font-size:14px;color:var(--t2)}
@keyframes cdPop{0%{transform:scale(1.5);opacity:0}100%{transform:scale(1);opacity:1}}

/* Ring timer */
.ring{width:170px;height:170px;margin:0 auto 14px;position:relative}
.ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring circle{fill:none;stroke-width:5}
.ring .trk{stroke:var(--bd)}.ring .prg{stroke:var(--ac);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.ring .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .big{font-size:40px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.ring .sm{font-size:11px;color:var(--t3);margin-top:3px}
.tbtns{display:flex;gap:10px;justify-content:center}
.tb{height:44px;padding:0 24px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s}
.tb:active{transform:scale(.95)}
.tb.go{background:var(--ac2);color:#fff}.tb.rs{background:var(--bd);color:var(--t2)}

/* Breathe */
.br-wrap{position:relative;width:170px;height:170px;margin:0 auto 14px}
.br-bg{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,#818cf815,transparent);border:2px solid var(--bd);transition:border-color .5s}
.br-fill{position:absolute;inset:8px;border-radius:50%;background:var(--ac);opacity:0;transition:opacity 5s ease-in-out,transform 5s ease-in-out;transform:scale(.3)}
.br-fill.in{opacity:.15;transform:scale(1)}
.br-fill.out{opacity:.04;transform:scale(.3)}
.br-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1}
.br-txt .phase{font-size:20px;font-weight:800}
.br-txt .sec{font-size:11px;color:var(--t3);margin-top:2px}
.br-time{font-size:36px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:8px}

/* Nav */
.ex-nav{
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:10px;
  border-top:1px solid var(--bd);
  background:var(--bg);position:fixed;bottom:0;left:0;right:0;z-index:10;
}
.nb{flex:1;height:50px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s}
.nb:active{transform:scale(.97)}
.nb.prev{background:var(--c1);border:1px solid var(--bd);color:var(--t2);flex:.35}
.nb.skip{background:var(--c1);border:1px solid var(--bd);color:var(--t3);flex:.35}
.nb.next{background:var(--ac2);color:#fff}
.nb.fin{background:var(--g);color:#09090b}

/* Complete */
.comp{align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center}
.comp .big-icon{font-size:52px;animation:compBounce .6s ease-out}
@keyframes compBounce{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.comp h2{font-size:22px;font-weight:800}
.comp p{color:var(--t2);font-size:14px;line-height:1.6;max-width:300px}
.comp .streak-result{
  background:var(--c1);border:1px solid var(--bd);border-radius:12px;
  padding:16px 24px;display:flex;align-items:center;gap:10px;
  font-size:14px;color:var(--t2);
}
.comp .streak-result .sn{font-size:28px;font-weight:800;color:var(--y)}
.comp button{height:50px;padding:0 32px;border-radius:12px;border:none;background:var(--ac2);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}

/* Confetti */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:60}

@media(min-width:500px){
  .home,.ov,.ex-body,.ex-nav,.ex-hd{max-width:480px;margin-left:auto;margin-right:auto}
  .pb{max-width:480px;margin:0 auto}
  .ex-nav{left:50%;transform:translateX(-50%);max-width:480px}
}
</style>
</head>
<body>

<div id="home" class="screen home active"></div>
<div id="overview" class="screen ov"></div>
<div id="exercise" class="screen ex">
  <div class="ex-hd"><button class="ex-b" id="exBack">&larr;</button><div class="ex-t" id="exT"></div><div class="ex-p" id="exP"></div></div>
  <div class="pb"><div class="pf" id="exPf"></div></div>
  <div class="ex-body" id="exB"></div>
  <div class="ex-nav" id="exN"></div>
</div>
<div id="complete" class="screen comp"></div>
<div class="countdown" id="cdOverlay" style="display:none"></div>
<canvas class="confetti" id="confetti" style="display:none"></canvas>

<script>
// ===== AUDIO ENGINE (Web Audio API) =====
const A={
  c:null,
  init(){try{this.c=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},
  resume(){if(this.c&&this.c.state==='suspended')this.c.resume()},
  _b(f,d,v=.15,type='sine'){
    if(!this.c)return;this.resume();
    const o=this.c.createOscillator(),g=this.c.createGain();
    o.type=type;o.connect(g);g.connect(this.c.destination);
    o.frequency.value=f;g.gain.setValueAtTime(v,this.c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,this.c.currentTime+d);
    o.start();o.stop(this.c.currentTime+d);
  },
  tick(){this._b(880,.06,.1)},
  go(){this._b(1047,.12,.15)},
  bell(){this._b(528,.5,.08)},
  inhale(){this._b(396,.3,.06);setTimeout(()=>this._b(528,.3,.06),150)},
  exhale(){this._b(528,.3,.06);setTimeout(()=>this._b(396,.3,.06),150)},
  sub(){this._b(660,.1,.08);setTimeout(()=>this._b(880,.1,.08),100)},
  done(){this._b(523,.15,.12);setTimeout(()=>this._b(659,.15,.12),150);setTimeout(()=>this._b(784,.3,.15),300)},
  complete(){[0,150,300,450].forEach((t,i)=>setTimeout(()=>this._b([523,659,784,1047][i],.2,.12),t))},
};

// ===== STREAK =====
const S={
  _k:'br_hist',
  get(){return JSON.parse(localStorage.getItem(this._k)||'{}')},
  log(r){const d=new Date().toISOString().slice(0,10),h=this.get();if(!h[d])h[d]=[];if(!h[d].includes(r))h[d].push(r);localStorage.setItem(this._k,JSON.stringify(h))},
  streak(){const h=this.get();let s=0,d=new Date();for(let i=0;i<365;i++){const k=new Date(d-i*864e5).toISOString().slice(0,10);if(h[k]&&h[k].length)s++;else if(i>0)break}return s},
  weekDots(){const h=this.get(),dots=[];const today=new Date();const dow=today.getDay()||7;for(let i=dow-1;i>=0;i--){const d=new Date(today-i*864e5).toISOString().slice(0,10);dots.push({done:!!(h[d]&&h[d].length),today:i===0})}for(let i=1;i<=7-dow;i++){dots.push({done:false,today:false})}return dots},
};

// ===== CONFETTI =====
function confetti(){
  const cv=document.getElementById('confetti'),cx=cv.getContext('2d');
  cv.style.display='block';cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ps=[];const colors=['#818cf8','#4ade80','#fbbf24','#f87171','#60a5fa','#f472b6'];
  for(let i=0;i<80;i++)ps.push({x:Math.random()*cv.width,y:-20-Math.random()*200,vx:(Math.random()-.5)*3,vy:Math.random()*4+2,r:Math.random()*6+3,c:colors[Math.floor(Math.random()*6)],rot:Math.random()*360,rv:(Math.random()-.5)*8});
  let frame=0;
  function draw(){cx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.rot+=p.rv;cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);cx.fillStyle=p.c;cx.globalAlpha=Math.max(0,1-frame/120);cx.fillRect(-p.r/2,-p.r,p.r,p.r*2);cx.restore()});frame++;if(frame<120)requestAnimationFrame(draw);else{cv.style.display='none';cx.clearRect(0,0,cv.width,cv.height)}}
  draw();
}

// ===== COUNTDOWN =====
function countdown(cb){
  const ov=document.getElementById('cdOverlay');ov.style.display='flex';
  let n=3;
  function tick(){
    if(n>0){ov.innerHTML=`<div class="cd-num">${n}</div><div class="cd-label">準備</div>`;A.tick();n--;setTimeout(tick,800)}
    else{ov.innerHTML=`<div class="cd-num" style="color:var(--g)">GO</div>`;A.go();setTimeout(()=>{ov.style.display='none';cb()},500)}
  }
  tick();
}

// ===== DATA =====
const D={
night:{title:'夜ルーティン',icon:'\u{1F319}',done:'お疲れさま。副交感神経が優位になった。このまま呼吸を続けて、寝落ちOK。',steps:[
{name:'足裏リリース（右足）',cat:'足裏リリース',sec:90,side:'R',
prep:['ラクロスボール or テニスボール 1個'],
steps:['床にボールを置く。<strong>右足の土踏まずあたり</strong>にボールが来るように足を乗せる。','体重の<strong>3〜4割</strong>をボールにかける。全体重は乗せない。','<strong>つま先側からかかと側へ</strong>、片道3〜4秒でゆっくり転がす。','<strong>痛い箇所で止めて20秒ホールド</strong>。「イタ気持ちいい」くらいの圧で。','<strong>土踏まず → 外側 → 指の付け根</strong>の3エリアをまんべんなく。','鼻でゆっくり呼吸。息を止めない。'],
feel:'足裏がじんわり温かくなる。終わった後に左右を比べると、右足の方が<strong>床をはっきり感じる</strong>。',
warn:'<strong>骨の真上（かかとの中央等）は避ける</strong>。柔らかい筋肉の部分を狙う。'},
{name:'足裏リリース（左足）',cat:'足裏リリース',sec:90,side:'L',
steps:['左足に切り替え。同じ要領で<strong>土踏まず → 外側 → 指の付け根</strong>。','左足は<strong>アーチ（土踏まず）を重点的に</strong>。','痛い箇所で20秒ホールド。鼻呼吸を続ける。']},
{name:'ハムストリングス（右）',cat:'フォームローリング',sec:60,side:'R',
prep:['フォームローラー 1本'],
diagram:`<div class="pose"><svg viewBox="0 0 220 80" width="220"><text x="110" y="12" text-anchor="middle" fill="#71717a" font-size="9">▼ 横から見た図</text><line x1="40" y1="40" x2="140" y2="40" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/><circle cx="45" cy="38" r="6" fill="#818cf8" opacity=".3"/><line x1="40" y1="50" x2="70" y2="65" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/><line x1="70" y1="65" x2="70" y2="55" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/><text x="75" y="68" fill="#a1a1aa" font-size="7">手で支える</text><rect x="105" y="42" width="30" height="12" rx="6" fill="#4ade80" opacity=".3" stroke="#4ade80" stroke-width="1.5"/><text x="120" y="50" text-anchor="middle" fill="#4ade80" font-size="7" font-weight="700">ローラー</text><text x="120" y="33" text-anchor="middle" fill="#f87171" font-size="8">太もも裏を乗せる</text><line x1="140" y1="40" x2="175" y2="38" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/><text x="170" y="32" fill="#a1a1aa" font-size="7">足</text><line x1="30" y1="72" x2="200" y2="72" stroke="#27272a" stroke-width="1" stroke-dasharray="3"/></svg><div class="cap">両手で後ろを支え、太もも裏をローラーに乗せて転がす</div></div>`,
steps:['床に座って両脚を伸ばす。ローラーを<strong>右の太もも裏（お尻の少し下）</strong>の下に横向きに置く。','両手を後ろについて体を支え、<strong>左脚は膝を曲げて床に</strong>（体重調整用）。','お尻を浮かせて太もも裏にローラーを当てる。<strong>体重の5-6割</strong>をかける。','<strong>お尻側 → 膝裏の手前</strong>まで、片道4〜5秒でゆっくり転がす。','<strong>痛い箇所で止めて20秒</strong>。足首を左右に揺らすとさらにほぐれる。','体を少しひねって<strong>真ん中 → 外側 → 内側</strong>の3ラインを順番に。'],
feel:'「ズーン」と鈍い圧迫感。やっているうちに<strong>痛みが和らいで柔らかくなる</strong>。',
warn:'<strong>膝裏の真上にローラーを当てない</strong>。手前5cmで止める。',
why:'ハムストリングスが硬いと骨盤を後方に引く（後傾の直接原因）。呼吸しながらで可動域改善+20-30%。'},
{name:'ハムストリングス（左）',cat:'フォームローリング',sec:60,side:'L',
steps:['左に切り替え。同じ要領で<strong>お尻側→膝裏手前</strong>をゆっくり転がす。','痛い箇所で20秒ホールド。3ラインまんべんなく。']},
{name:'ふくらはぎ（右）',cat:'フォームローリング',sec:60,side:'R',
steps:['両脚を伸ばして座る。ローラーを<strong>右ふくらはぎ</strong>の下に置く。','左脚を右脚の上に重ねると圧が増す（軽くしたい場合は横に）。','<strong>アキレス腱の上 → 膝裏手前</strong>まで転がす。','足を<strong>内向き・まっすぐ・外向き</strong>にして3ラインを狙う。','痛い箇所で<strong>足首を上下に動かしながら</strong>ホールド。'],
feel:'ほぐれると<strong>足首の動きが軽く</strong>なる。'},
{name:'ふくらはぎ（左）',cat:'フォームローリング',sec:60,side:'L',
steps:['左に切り替え。同じく3ラインを転がす。']},
{name:'大殿筋（お尻）',cat:'フォームローリング',sec:60,side:'both',
steps:['ローラーの上に<strong>右のお尻</strong>を乗せる。<strong>右足首を左膝の上に載せて4の字</strong>にする。','両手を後ろについて支える。お尻の一番盛り上がった部分に当てる。','前後に小さく動かし、<strong>痛い箇所で20秒</strong>ホールド。','<strong>左のお尻</strong>に切り替えて同様に。'],
feel:'お尻の奥に「ズーン」。緩むと<strong>股関節がグッと広がる</strong>。',
warn:'尾骨には当てない。'},
// ── ストレッチ ──
{name:'90/90ヒップストレッチ（右前）',cat:'ストレッチ',sec:30,side:'R',
prep:['床に座る（マットがあればベスト）'],
diagram:`<div class="pose-row"><div class="pose"><svg viewBox="0 0 180 150" width="170"><text x="90" y="14" text-anchor="middle" fill="#71717a" font-size="10" font-weight="600">▼ 上から見た図</text><circle cx="90" cy="48" r="16" fill="#818cf8" opacity=".15" stroke="#818cf8" stroke-width="2"/><text x="90" y="52" text-anchor="middle" fill="#fafafa" font-size="10" font-weight="700">体</text><line x1="90" y1="64" x2="55" y2="92" stroke="#f87171" stroke-width="3.5" stroke-linecap="round"/><line x1="55" y1="92" x2="55" y2="130" stroke="#f87171" stroke-width="3.5" stroke-linecap="round"/><circle cx="55" cy="92" r="5" fill="#f87171"/><text x="38" y="90" text-anchor="end" fill="#f87171" font-size="10" font-weight="700">右膝</text><text x="44" y="136" text-anchor="end" fill="#f87171" font-size="9">右足</text><path d="M62,97 Q55,108 58,120" fill="none" stroke="#f87171" stroke-width="1" stroke-dasharray="3"/><text x="70" y="114" fill="#f87171" font-size="9" font-weight="700">90°</text><line x1="90" y1="64" x2="125" y2="92" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round"/><line x1="125" y1="92" x2="158" y2="92" stroke="#60a5fa" stroke-width="3.5" stroke-linecap="round"/><circle cx="125" cy="92" r="5" fill="#60a5fa"/><text x="138" y="86" fill="#60a5fa" font-size="10" font-weight="700">左膝</text><text x="162" y="86" fill="#60a5fa" font-size="9">左足</text><path d="M130,97 Q138,92 140,99" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3"/><text x="144" y="106" fill="#60a5fa" font-size="9" font-weight="700">90°</text><text x="90" y="148" text-anchor="middle" fill="#a1a1aa" font-size="10">&larr; 正面 &rarr;</text></svg><div class="cap">完成形：両膝とも90°に曲がっている</div></div></div>`,
steps:['<strong>まず体育座り</strong>をする（膝を曲げて足を床につけて座る）。',
'そこから<strong>両膝をバタンと右に倒す</strong>。ワイパーのように。',
'すると<strong>右すねが体の正面</strong>に横向き、<strong>左すねが体の左後ろ</strong>に向く。両膝とも約90°曲がった状態。上の図を参考に。',
'背筋を伸ばして、<strong>おへそを右すねに向かって前に倒す</strong>。手は床についてOK。',
'<strong>右のお尻の外側がじわ〜っと伸びたら正解</strong>。30秒キープ。',
'吐くたびに少しだけ深く。<strong>浅くても効いている</strong>。'],
feel:'右のお尻の横〜奥に<strong>じわっと伸びる</strong>感覚。「痛い」ではなく「伸びてる〜」。',
warn:'<strong>膝が痛い場合は角度を浅くする</strong>。お尻の下にクッションを敷くと楽になる。',
why:'股関節の内旋・外旋可動域を同時に改善。骨盤の動きを正常化する。'},
{name:'90/90ヒップストレッチ（左前）',cat:'ストレッチ',sec:30,side:'L',
steps:['さっきの体勢から<strong>両膝を反対側（左側）にバタンと倒す</strong>。','今度は<strong>左すねが正面、右すねが右後ろ</strong>。さっきの左右反転。','おへそを左すねに向かって前に倒す。30秒。']},
{name:'ハムストリングスストレッチ（右脚）',cat:'ストレッチ',sec:30,side:'R',
steps:['<strong>仰向け</strong>に寝る。','タオルやバンドを<strong>右足の裏</strong>にかける。','両端を持って<strong>右脚を天井に向かって上げる</strong>。膝はできるだけ伸ばす（完全に伸びなくてOK）。','<strong>太もも裏がピーンと張る角度</strong>で止めてキープ。左脚は床に伸ばしたまま。'],
feel:'太もも裏〜膝裏に<strong>ピーンと張る</strong>感覚。',
warn:'<strong>反動をつけて引っ張らない</strong>。腰が浮いたら上げすぎ。'},
{name:'ハムストリングスストレッチ（左脚）',cat:'ストレッチ',sec:30,side:'L',
steps:['左脚に切り替え。同じ要領で。']},
{name:'スパイナルツイスト（右）',cat:'ストレッチ',sec:30,side:'R',
diagram:`<div class="pose"><svg viewBox="0 0 240 90" width="230"><text x="120" y="12" text-anchor="middle" fill="#71717a" font-size="9">▼ 上から見た図（仰向け）</text><circle cx="120" cy="40" r="10" fill="#818cf8" opacity=".2" stroke="#818cf8" stroke-width="1.5"/><line x1="120" y1="50" x2="120" y2="60" stroke="#818cf8" stroke-width="2"/><line x1="120" y1="50" x2="60" y2="50" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/><line x1="120" y1="50" x2="180" y2="50" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/><text x="52" y="46" text-anchor="end" fill="#a1a1aa" font-size="8">右手</text><text x="188" y="46" fill="#a1a1aa" font-size="8">左手</text><line x1="120" y1="60" x2="85" y2="60" stroke="#f87171" stroke-width="3" stroke-linecap="round"/><line x1="85" y1="60" x2="85" y2="42" stroke="#f87171" stroke-width="3" stroke-linecap="round"/><circle cx="85" cy="60" r="4" fill="#f87171"/><text x="70" y="40" fill="#f87171" font-size="8" font-weight="700">右膝</text><text x="75" y="78" fill="#f87171" font-size="8">&larr; 左に倒す</text><text x="120" y="32" text-anchor="middle" fill="#a1a1aa" font-size="8">顔→右</text></svg><div class="cap">仰向け＋腕T字＋右膝を左に倒す＋顔は右</div></div>`,
steps:['<strong>仰向け</strong>で両腕をT字に広げる。','<strong>右膝を曲げて胸に近づける</strong>。左脚はまっすぐ。','<strong>左手で右膝を持って左側にゆっくり倒す</strong>。','★<strong>右肩は床から離さない</strong>★ 肩が浮くなら膝の角度を浅く。','顔は<strong>右</strong>を向く。背中が<strong>雑巾しぼりのようにねじれる</strong>のを感じる。'],
feel:'腰〜背中に<strong>気持ちいいねじれ感</strong>。',
why:'迷走神経が走る内臓をマッサージ。副交感神経ON。'},
{name:'スパイナルツイスト（左）',cat:'ストレッチ',sec:30,side:'L',
steps:['反対側。<strong>左膝を曲げて右に倒す</strong>。左肩は床に。顔は左。']},
{name:'チャイルドポーズ',cat:'ストレッチ',sec:60,side:'both',
diagram:`<div class="pose"><svg viewBox="0 0 220 80" width="210"><text x="110" y="12" text-anchor="middle" fill="#71717a" font-size="9">▼ 横から見た図</text><ellipse cx="125" cy="38" rx="24" ry="16" fill="#818cf8" opacity=".15" stroke="#818cf8" stroke-width="1.5" transform="rotate(-15,125,38)"/><text x="125" y="42" text-anchor="middle" fill="#a1a1aa" font-size="8">丸い背中</text><line x1="145" y1="48" x2="155" y2="60" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/><line x1="155" y1="60" x2="148" y2="66" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/><text x="162" y="64" fill="#a1a1aa" font-size="7">踵にお尻</text><line x1="107" y1="32" x2="65" y2="38" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/><text x="58" y="35" text-anchor="end" fill="#a1a1aa" font-size="7">腕を前に</text><circle cx="105" cy="30" r="7" fill="#818cf8" opacity=".25" stroke="#818cf8" stroke-width="1.5"/><text x="105" y="33" text-anchor="middle" fill="#a1a1aa" font-size="6">頭</text><text x="105" y="46" text-anchor="middle" fill="#4ade80" font-size="7">↓額を床に</text><line x1="40" y1="70" x2="190" y2="70" stroke="#27272a" stroke-width="1" stroke-dasharray="3"/></svg><div class="cap">正座→前に倒れる→額を床に→背中で呼吸する</div></div>`,
steps:['<strong>正座</strong>する。','膝を<strong>腰幅〜肩幅に開く</strong>。つま先はくっつけたまま。','手を前に這わせながら<strong>上体をゆっくり前に倒す</strong>。','<strong>額を床に</strong>つける（つかなければ拳の上に）。','お尻はできるだけ踵の上に。浮いてもOK。','<strong>鼻から吸って、背中が風船のように「後ろと横に」膨らむ</strong>のを意識。','吐くとき<strong>全身の力を抜いて床に溶けていく</strong>。60秒。'],
feel:'背中が<strong>360°広がる感覚</strong>。お腹が太ももに押されて安心感。',
why:'腹部の迷走神経枝を圧迫刺激→副交感神経のスイッチ。ここから入眠モード。'},
// ── マット ──
{name:'アキュプレッシャーマット',cat:'リラクゼーション',sec:600,optional:true,side:'both',
prep:['スパイクマット（なければスキップ）'],
steps:['マットを敷いて<strong>ゆっくり背中から寝転がる</strong>。','最初30秒〜1分は<strong>チクチク痛い</strong>。正常。','<strong>鼻呼吸しながら待つ</strong>と1-2分で温かさに変わる。','慣れたら素肌で。このまま次の呼吸を始めてもOK。'],
feel:'チクチク → <strong>じんわり温かい → 体が重くなる</strong>。',
why:'「スマホを置いて横になる」仕組み。呼吸法の強制プラットフォーム。'},
// ── 呼吸 ──
{name:'共鳴呼吸',cat:'呼吸（核心）',sec:300,breathing:true,side:'both',
diagram:`<div class="pose"><svg viewBox="0 0 240 50" width="230"><rect x="30" y="18" width="180" height="18" rx="9" fill="#818cf8" opacity=".1" stroke="#818cf8" stroke-width="1.5"/><circle cx="48" cy="27" r="7" fill="#818cf8" opacity=".25"/><text x="48" y="30" text-anchor="middle" fill="#a1a1aa" font-size="7">頭</text><text x="130" y="30" text-anchor="middle" fill="#a1a1aa" font-size="8">仰向け・両手はお腹の上</text><text x="130" y="14" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">5秒吸う → 5秒吐く（毎分6回）</text><line x1="30" y1="40" x2="210" y2="40" stroke="#27272a" stroke-width="1" stroke-dasharray="3"/></svg><div class="cap">苦しかったら4秒に短縮OK。そのまま寝落ちOK。</div></div>`,
steps:['<strong>仰向け</strong>。目を閉じる。<strong>両手をお腹の上に</strong>置く。','<strong>鼻から5秒かけて吸う</strong>。お腹が手を押し上げる。','<strong>鼻から5秒かけて吐く</strong>。お腹がへこむ。','上の呼吸アニメーションに合わせてもOK。','慣れたら吐いた後<strong>2秒止める</strong>（5秒吸い→5秒吐き→2秒止め）。','<strong>苦しかったら4秒に短縮</strong>。楽にできることが最優先。寝落ちOK。'],
feel:'3分くらいで<strong>体が重くなり手足が温かくなる</strong>。心拍が落ち着く。',
why:'4週間の毎日実践でHRV有意改善。Cohen\'s d=0.907。24BPMを6BPMにリセット。'},
]},
morning:{title:'朝ルーティン',icon:'\u2600\uFE0F',done:'関節が目覚めた。足裏と骨盤の土台ができた状態で1日が始まる。',steps:[
{name:'冷水洗顔',cat:'迷走神経',sec:60,side:'both',steps:['洗面台に<strong>冷水を溜める</strong>。','<strong>顔全体をつける</strong>。30秒。','顔を上げて呼吸。もう1回できればベスト。'],feel:'心拍がスッと落ちて、顔を上げると<strong>シャキッ</strong>。',why:'潜水反射→迷走神経→副交感神経ON。覚醒＋落ち着き。'},
{name:'首の回旋',cat:'CARs',sec:40,side:'both',steps:['背筋を伸ばして立つ or 座る。','頭を<strong>ゆっくり最大可動域で回す</strong>。1周10秒くらい。','時計回り3回 → 反時計回り3回。'],warn:'痛みが走る方向には無理に回さない。'},
{name:'肩甲骨まわし',cat:'CARs',sec:50,side:'both',steps:['肩を<strong>すくめる → 後ろに引く → 下げる → 前に出す</strong>。','大きく円を描くように。各方向3回。']},
{name:'肩関節の回旋',cat:'CARs',sec:50,side:'both',steps:['<strong>腕をまっすぐ伸ばして大きく回す</strong>。','引っかかるポイントはゆっくり通過。各方向3回。左右とも。']},
{name:'胸椎の回旋',cat:'CARs',sec:40,side:'both',steps:['座って両手を胸の前で組む。','<strong>下半身は固定、上半身だけ左右にひねる</strong>。各方向3回。']},
{name:'股関節の回旋（右）',cat:'CARs',sec:40,side:'R',
diagram:`<div class="pose"><svg viewBox="0 0 160 110" width="150"><text x="80" y="12" text-anchor="middle" fill="#71717a" font-size="9">▼ 正面から見た図</text><line x1="80" y1="38" x2="80" y2="70" stroke="#818cf8" stroke-width="2.5"/><circle cx="80" cy="30" r="8" fill="#818cf8" opacity=".25" stroke="#818cf8" stroke-width="1.5"/><line x1="80" y1="70" x2="80" y2="105" stroke="#818cf8" stroke-width="2.5" opacity=".4"/><text x="80" y="112" text-anchor="middle" fill="#a1a1aa" font-size="7">左脚（軸）</text><line x1="80" y1="70" x2="108" y2="50" stroke="#f87171" stroke-width="3" stroke-linecap="round"/><circle cx="108" cy="50" r="3.5" fill="#f87171"/><path d="M108,42 Q128,52 118,72 Q108,90 88,86" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4"/><text x="132" y="60" fill="#f87171" font-size="8" font-weight="700">大きく回す</text><text x="25" y="62" fill="#a1a1aa" font-size="7">壁に手→</text><line x1="42" y1="54" x2="60" y2="54" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/></svg><div class="cap">壁に手をつき、膝を上げて大きく円を描く</div></div>`,
steps:['壁に左手をついて<strong>左脚で立つ</strong>。','<strong>右膝を胸の高さまで上げる</strong>。','そのまま<strong>膝を外に開いて→後ろに回して→下ろす</strong>。大きな円。','各方向3回。<strong>上半身は動かさない</strong>。']},
{name:'股関節の回旋（左）',cat:'CARs',sec:40,side:'L',steps:['左脚に切り替え。各方向3回。']},
{name:'足首の回旋（右）',cat:'CARs',sec:20,side:'R',steps:['右足を浮かせて<strong>足首をゆっくり大きく回す</strong>。各方向5回。'],why:'扁平足対策の要。アーチの動的安定性に直結。'},
{name:'足首の回旋（左）',cat:'CARs',sec:20,side:'L',steps:['左足首。各方向5回。']},
{name:'Short Foot Exercise',cat:'足部リプログラミング',sec:60,side:'both',
diagram:`<div class="pose-row"><div class="pose"><svg viewBox="0 0 110 90" width="100"><text x="55" y="12" text-anchor="middle" fill="#71717a" font-size="9">Before</text><path d="M25,72 Q25,35 38,25 Q50,20 60,20 Q75,20 80,30 Q85,40 85,72" fill="none" stroke="#71717a" stroke-width="2"/><line x1="25" y1="72" x2="85" y2="72" stroke="#71717a" stroke-width="2"/><path d="M38,72 Q55,67 72,72" fill="none" stroke="#71717a" stroke-width="1.5" stroke-dasharray="3"/><text x="55" y="62" text-anchor="middle" fill="#71717a" font-size="8">低い</text></svg></div><div class="pose"><svg viewBox="0 0 110 90" width="100"><text x="55" y="12" text-anchor="middle" fill="#71717a" font-size="9">After</text><path d="M30,72 Q28,33 40,24 Q52,19 62,19 Q76,19 80,29 Q82,39 80,72" fill="none" stroke="#4ade80" stroke-width="2.5"/><line x1="30" y1="72" x2="80" y2="72" stroke="#4ade80" stroke-width="2"/><path d="M38,72 Q55,48 72,72" fill="none" stroke="#4ade80" stroke-width="2.5"/><text x="55" y="58" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="700">UP!</text><text x="55" y="85" text-anchor="middle" fill="#fbbf24" font-size="8">指は浮かさない</text></svg></div></div>`,
steps:['<strong>椅子に座って裸足</strong>。両足を床に平らに。','★ <strong>足指は5本とも床につけたまま。浮かせない</strong>。','<strong>指の付け根と踵を近づけるように足裏を縮める</strong>。','アーチが<strong>グッと持ち上がる</strong>。足裏で床を<strong>吸盤のように吸い付く</strong>感覚。','3秒キープ → 緩める。<strong>15回</strong>。','最初は「動かない！」が普通。<strong>意識するだけでOK</strong>。1週間で動く。'],
feel:'土踏まずが<strong>ピクッと上がる</strong>感覚。',warn:'<strong>指を丸めて掴むのはNG</strong>。指は伸ばしたまま。',why:'6週間で舟状骨降下距離32%改善。最強クラスのエビデンス。'},

// ===== STATE =====
let rk=null,si=0,ti=null,rem=0,run=false,bi=null,bSec=0;

// ===== SCREENS =====
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

function renderHome(){
  const el=document.getElementById('home');
  const sk=S.streak(),dots=S.weekDots();
  let h=`<h1>Body Routine</h1><p class="sub">呼吸 &rarr; 骨盤 &rarr; 足部 &rarr; すべてが変わる</p>`;
  h+=`<div class="streak-bar"><span class="fire">&#128293;</span><span class="num">${sk}</span><span>日連続</span></div>`;
  h+=`<div class="week-dots">${dots.map(d=>`<div class="wdot${d.done?' done':''}${d.today?' today':''}"></div>`).join('')}</div>`;
  [{k:'night',c:'n',i:'&#127769;'},{k:'morning',c:'m',i:'&#9728;&#65039;'},{k:'pre',c:'p',i:'&#9889;'},{k:'weekly',c:'w',i:'&#128170;'},{k:'daily',c:'d',i:'&#9201;'}].forEach(r=>{
    const d=D[r.k],mins=Math.round(d.steps.reduce((a,s)=>a+s.sec,0)/60);
    h+=`<div class="rc" onclick="showOverview('${r.k}')"><div class="ri ${r.c}">${r.i}</div><div class="rf"><h3>${d.title}</h3><div class="meta"><span>${mins}分</span><span>${d.steps.length}種目</span></div></div><div class="arr">&rsaquo;</div></div>`;
  });
  el.innerHTML=h;
}

function showOverview(k){
  rk=k;const d=D[k],el=document.getElementById('overview');
  const totalMin=Math.round(d.steps.reduce((a,s)=>a+s.sec,0)/60);
  let h=`<div class="ov-head"><button class="ov-back" onclick="renderHome();show('home')">&larr;</button><h2>${d.icon} ${d.title}</h2></div>`;
  h+=`<div class="ov-info"><span>${d.steps.length}種目</span><span>約${totalMin}分</span></div>`;
  h+=`<div class="ov-list">`;
  d.steps.forEach((s,i)=>{
    const sd=s.side==='R'?'<span class="side-r">右</span>':s.side==='L'?'<span class="side-l">左</span>':'';
    h+=`<div class="ov-item${s.optional?' opt':''}" onclick="si=${i};show('exercise');render()"><span class="ov-num">${i+1}</span><span class="name">${s.name}</span>${sd}<span class="time">${fmt(s.sec)}</span></div>`;
  });
  h+=`</div><button class="ov-start" onclick="si=0;show('exercise');render()">スタート</button>`;
  el.innerHTML=h;show('overview');
}

// ===== EXERCISE RENDER =====
function render(){
  stop();stopB();
  const d=D[rk],s=d.steps[si],t=d.steps.length;
  document.getElementById('exT').textContent=d.title;
  document.getElementById('exP').textContent=`${si+1} / ${t}`;
  document.getElementById('exPf').style.width=`${((si+1)/t)*100}%`;
  document.getElementById('exBack').onclick=()=>{stop();stopB();showOverview(rk)};
  rem=s.sec;run=false;

  const b=document.getElementById('exB');b.innerHTML='';b.scrollTop=0;
  let h='';
  h+=`<div><div class="s-cat">${s.cat||''}</div><div class="s-name">${s.name}</div></div>`;
  h+=`<div class="s-badges"><div class="badge time">\u23F1 ${fmt(s.sec)}</div>`;
  if(s.side==='R')h+=`<div class="badge R">右側</div>`;
  if(s.side==='L')h+=`<div class="badge L">左側</div>`;
  if(s.optional)h+=`<div class="badge opt">スキップ可</div>`;
  h+=`</div>`;
  if(s.prep){h+=`<div class="prep"><h4>用意するもの</h4><ul>${s.prep.map(p=>`<li>${p}</li>`).join('')}</ul></div>`}
  if(s.diagram)h+=s.diagram;
  h+=`<div class="inst"><div class="inst-h">&#128220; やり方</div><div class="inst-c"><div class="ns">`;
  s.steps.forEach((st,i)=>h+=`<div class="n1"><div class="nc">${i+1}</div><div class="nt">${st}</div></div>`);
  h+=`</div></div></div>`;
  if(s.feel)h+=`<div class="tip feel"><span class="tl">効いている感覚</span>${s.feel}</div>`;
  if(s.warn)h+=`<div class="tip warn"><span class="tl">注意</span>${s.warn}</div>`;
  if(s.why)h+=`<div class="tip why"><span class="tl">なぜやるか</span>${s.why}</div>`;

  // Timer
  if(s.breathing){
    h+=`<div class="tcard"><div class="br-wrap" id="brW"><div class="br-bg"></div><div class="br-fill" id="brF"></div><div class="br-txt"><div class="phase" id="brP">準備OK</div><div class="sec" id="brS"></div></div></div><div class="br-time" id="td">${fmt(rem)}</div><div class="tbtns"><button class="tb go" id="tb" onclick="onStart()">スタート</button><button class="tb rs" onclick="rst()">リセット</button></div></div>`;
  }else{
    const c=2*Math.PI*80;
    h+=`<div class="tcard"><div class="ring"><svg viewBox="0 0 200 200"><circle class="trk" cx="100" cy="100" r="80"/><circle class="prg" id="tp" cx="100" cy="100" r="80" stroke-dasharray="${c}" stroke-dashoffset="0"/></svg><div class="mid"><div class="big" id="td">${fmt(rem)}</div></div></div><div class="tbtns"><button class="tb go" id="tb" onclick="onStart()">スタート</button><button class="tb rs" onclick="rst()">リセット</button></div></div>`;
  }
  b.innerHTML=h;

  // Nav
  const n=document.getElementById('exN');let nv='';
  if(si>0)nv+=`<button class="nb prev" onclick="prev()">&larr; 戻る</button>`;
  if(s.optional)nv+=`<button class="nb skip" onclick="next()">スキップ</button>`;
  nv+=`<button class="nb ${si===t-1?'fin':'next'}" onclick="next()">${si===t-1?'完了':'次へ &rarr;'}</button>`;
  n.innerHTML=nv;
}

// ===== TIMER =====
function onStart(){A.init();A.resume();if(run)pause();else{if(rem===D[rk].steps[si].sec)countdown(()=>start());else start()}}
function start(){
  run=true;const btn=document.getElementById('tb');if(btn)btn.textContent='一時停止';
  const s=D[rk].steps[si];if(s.breathing)startB();
  ti=setInterval(()=>{
    rem--;upd();
    if(rem===3||rem===2||rem===1)A.tick();
    if(rem<=0){stop();stopB();A.done();if(navigator.vibrate)navigator.vibrate([200,100,200]);const b=document.getElementById('tb');if(b){b.textContent='完了!';b.disabled=true;b.style.background='var(--g)';b.style.color='#09090b'}}
  },1000);
}
function pause(){run=false;clearInterval(ti);stopB();const b=document.getElementById('tb');if(b)b.textContent='再開'}
function stop(){run=false;clearInterval(ti);ti=null}
function rst(){stop();stopB();rem=D[rk].steps[si].sec;upd();const b=document.getElementById('tb');if(b){b.textContent='スタート';b.disabled=false;b.style.background='';b.style.color=''}}
function upd(){
  const d=document.getElementById('td');if(d)d.textContent=fmt(rem);
  const s=D[rk].steps[si],p=document.getElementById('tp');
  if(p){const c=2*Math.PI*80;p.style.strokeDashoffset=c*(rem/s.sec)}
}

// ===== BREATHING =====
function startB(){
  bSec=0;breatheTick();
  bi=setInterval(()=>{bSec++;breatheTick()},1000);
}
function breatheTick(){
  const cycle=10;const pos=bSec%cycle;
  const f=document.getElementById('brF'),p=document.getElementById('brP'),s=document.getElementById('brS');
  if(!f)return;
  if(pos===0){f.className='br-fill in';if(p)p.textContent='吸う';A.inhale()}
  else if(pos===5){f.className='br-fill out';if(p)p.textContent='吐く';A.exhale()}
  const phaseRem=pos<5?5-pos:10-pos;
  if(s)s.textContent=`${phaseRem}秒`;
}
function stopB(){clearInterval(bi);bi=null}

// ===== NAV =====
function prev(){if(si>0){stop();stopB();si--;render()}}
function next(){
  stop();stopB();si++;
  if(si>=D[rk].steps.length){
    S.log(rk);A.init();A.complete();confetti();
    const d=D[rk],sk=S.streak();
    document.getElementById('complete').innerHTML=`<div class="big-icon">${d.icon}</div><h2>${d.title} 完了</h2><p>${d.done}</p><div class="streak-result"><span class="fire">&#128293;</span><span class="sn">${sk}</span><span>日連続</span></div><button onclick="renderHome();show('home')">ホームに戻る</button>`;
    show('complete');
  }else render();
}
function fmt(s){if(s<0)s=0;return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}

// ===== INIT =====
renderHome();
</script>
