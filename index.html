<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Body Routine</title>
<style>
:root {
  --bg: #09090b;
  --card: #18181b;
  --card2: #1e1e24;
  --border: #27272a;
  --accent: #818cf8;
  --accent2: #6366f1;
  --text: #fafafa;
  --text2: #a1a1aa;
  --text3: #71717a;
  --green: #4ade80;
  --green-bg: #4ade8012;
  --yellow: #fbbf24;
  --yellow-bg: #fbbf2412;
  --red: #f87171;
  --blue: #60a5fa;
  --blue-bg: #60a5fa12;
  --pink: #f472b6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  line-height:1.5;
}
.screen{display:none;min-height:100dvh}
.screen.active{display:flex;flex-direction:column}

/* === HOME === */
.home{padding:20px 16px env(safe-area-inset-bottom);gap:12px;padding-bottom:40px}
.home h1{font-size:26px;font-weight:800;text-align:center;margin:16px 0 2px;letter-spacing:-.5px}
.home .sub{text-align:center;color:var(--text3);font-size:12px;margin-bottom:8px}
.rcard{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px 18px;cursor:pointer;
  transition:transform .12s;display:flex;gap:14px;align-items:center;
}
.rcard:active{transform:scale(.97)}
.ricon{
  width:50px;height:50px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
}
.ricon.n{background:#7c3aed18}.ricon.m{background:#f59e0b18}
.ricon.p{background:#06b6d418}.ricon.w{background:#22c55e18}.ricon.d{background:#f472b618}
.rinfo{flex:1}
.rinfo h3{font-size:16px;font-weight:700;margin-bottom:2px}
.rinfo .meta{font-size:12px;color:var(--text3)}
.rinfo .meta span{margin-right:10px}
.rcard .arr{color:var(--text3);font-size:18px;flex-shrink:0}

/* === EXERCISE === */
.ex-screen{padding:0;background:var(--bg)}
.ex-head{
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg);z-index:10;
}
.ex-btn{
  width:38px;height:38px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.ex-ht{font-size:14px;font-weight:600;flex:1;color:var(--text2)}
.ex-hp{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.pbar{height:3px;background:var(--card)}
.pfill{height:100%;background:var(--accent);transition:width .3s}

.ex-body{
  flex:1;padding:20px 16px 0;overflow-y:auto;
  display:flex;flex-direction:column;gap:16px;
  padding-bottom:100px;
}

/* Step header */
.step-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:8px;
  background:var(--accent);color:white;
  font-size:13px;font-weight:800;flex-shrink:0;
}
.step-head{display:flex;align-items:center;gap:10px}
.step-cat{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.step-name{font-size:22px;font-weight:800;line-height:1.25;margin-top:2px}
.step-time-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:5px 10px;font-size:13px;font-weight:600;color:var(--accent);width:fit-content;
}
.step-side{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;
  width:fit-content;
}
.step-side.L{background:#3b82f618;color:#60a5fa}
.step-side.R{background:#f4727118;color:#f87171}
.step-side.both{background:#a78bfa18;color:#a78bfa}

/* Instruction card */
.inst-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
}
.inst-header{
  padding:14px 16px;font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--border);
}
.inst-header .icon{font-size:16px}
.inst-content{padding:14px 16px}

/* Numbered steps */
.num-steps{display:flex;flex-direction:column;gap:12px}
.num-step{display:flex;gap:12px;align-items:flex-start}
.num-circle{
  width:24px;height:24px;border-radius:50%;
  background:var(--accent2);color:white;
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.num-text{font-size:14px;line-height:1.65;color:var(--text2)}
.num-text strong{color:var(--text);font-weight:600}

/* Tips / Feel / Mistakes */
.tip-box{
  border-radius:10px;padding:12px 14px;
  font-size:13px;line-height:1.6;
  margin-top:4px;
}
.tip-box.feel{background:var(--green-bg);border-left:3px solid var(--green);color:var(--green)}
.tip-box.feel strong{color:var(--green)}
.tip-box.warn{background:var(--yellow-bg);border-left:3px solid var(--yellow);color:var(--yellow)}
.tip-box.warn strong{color:var(--yellow)}
.tip-box.why{background:var(--blue-bg);border-left:3px solid var(--blue);color:var(--blue)}
.tip-box.why strong{color:var(--blue)}
.tip-box .label{font-weight:700;margin-bottom:4px;display:block;font-size:12px;text-transform:uppercase;letter-spacing:.5px}

/* Timer */
.timer-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:24px;text-align:center;
}
.timer-num{
  font-size:60px;font-weight:800;
  font-variant-numeric:tabular-nums;letter-spacing:2px;
  margin-bottom:16px;line-height:1;
}
.timer-btns{display:flex;gap:10px;justify-content:center}
.tbtn{
  height:46px;padding:0 26px;border-radius:12px;border:none;
  font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s;
}
.tbtn:active{transform:scale(.95)}
.tbtn.go{background:var(--accent2);color:white}
.tbtn.rst{background:var(--border);color:var(--text2)}

.timer-ring{width:180px;height:180px;margin:0 auto 16px;position:relative}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:5}
.timer-ring .trk{stroke:var(--border)}
.timer-ring .prg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.timer-ring .tt{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.timer-ring .tt .big{font-size:42px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.timer-ring .tt .sm{font-size:12px;color:var(--text3);margin-top:4px}

/* Sub parts */
.subs{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.sub-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--card2);
  border-radius:8px;font-size:13px;
}
.sub-row.act{background:#818cf815;outline:1px solid #818cf830}
.sub-row.dn{opacity:.35;text-decoration:line-through}
.sub-row .sn{flex:1}.sub-row .st{font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}

/* Breathe */
.breathe{
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,#818cf820,transparent);
  border:2px solid var(--accent);margin:0 auto;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;
  transition:transform 5s ease-in-out,opacity 5s ease-in-out;
}
.breathe.in{transform:scale(1.35);opacity:1}
.breathe.out{transform:scale(.75);opacity:.5}

/* Nav */
.ex-nav{
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  display:flex;gap:10px;
  border-top:1px solid var(--border);
  background:var(--bg);position:fixed;bottom:0;left:0;right:0;z-index:10;
}
.nbtn{
  flex:1;height:52px;border-radius:12px;border:none;
  font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s;
}
.nbtn:active{transform:scale(.97)}
.nbtn.prev{background:var(--card);border:1px solid var(--border);color:var(--text2);flex:.35}
.nbtn.skip{background:var(--card);border:1px solid var(--border);color:var(--text3);flex:.35}
.nbtn.next{background:var(--accent2);color:white}
.nbtn.fin{background:var(--green);color:#09090b}

/* Complete */
.comp{align-items:center;justify-content:center;gap:20px;padding:32px;text-align:center}
.comp .ci{font-size:56px}
.comp h2{font-size:22px;font-weight:800}
.comp p{color:var(--text2);font-size:14px;line-height:1.6;max-width:300px}
.comp button{
  margin-top:12px;height:52px;padding:0 36px;
  border-radius:12px;border:none;background:var(--accent2);
  color:white;font-size:15px;font-weight:700;cursor:pointer;
}

/* Prep card */
.prep-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px;
}
.prep-card h4{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px}
.prep-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.prep-list li{font-size:13px;color:var(--text3);display:flex;align-items:center;gap:8px}
.prep-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

@media(min-width:500px){
  .home,.ex-body,.ex-nav,.ex-head{max-width:480px;margin-left:auto;margin-right:auto}
  .pbar{max-width:480px;margin:0 auto}
  .ex-nav{left:50%;transform:translateX(-50%);max-width:480px}
}
</style>
</head>
<body>

<div id="home" class="screen home active">
  <h1>Body Routine</h1>
  <p class="sub">呼吸 → 骨盤 → 足部 → すべてが変わる</p>
  <div class="rcard" onclick="go('night')"><div class="ricon n">&#127769;</div><div class="rinfo"><h3>夜ルーティン</h3><div class="meta"><span>25-30分</span><span>就寝45分前</span></div></div><div class="arr">&rsaquo;</div></div>
  <div class="rcard" onclick="go('morning')"><div class="ricon m">&#9728;&#65039;</div><div class="rinfo"><h3>朝ルーティン</h3><div class="meta"><span>10-15分</span><span>起床後</span></div></div><div class="arr">&rsaquo;</div></div>
  <div class="rcard" onclick="go('pre')"><div class="ricon p">&#9889;</div><div class="rinfo"><h3>本番 / 稽古前</h3><div class="meta"><span>5分</span><span>JKD・演奏前</span></div></div><div class="arr">&rsaquo;</div></div>
  <div class="rcard" onclick="go('weekly')"><div class="ricon w">&#128170;</div><div class="rinfo"><h3>週2-3回 補強</h3><div class="meta"><span>15分</span><span>稽古のない日</span></div></div><div class="arr">&rsaquo;</div></div>
  <div class="rcard" onclick="go('daily')"><div class="ricon d">&#9201;</div><div class="rinfo"><h3>日中の1分ハック</h3><div class="meta"><span>30秒-1分</span><span>隙間時間に</span></div></div><div class="arr">&rsaquo;</div></div>
</div>

<div id="exercise" class="screen ex-screen">
  <div class="ex-head">
    <button class="ex-btn" onclick="home()">&larr;</button>
    <div class="ex-ht" id="eHt"></div>
    <div class="ex-hp" id="eHp"></div>
  </div>
  <div class="pbar"><div class="pfill" id="ePf"></div></div>
  <div class="ex-body" id="eB"></div>
  <div class="ex-nav" id="eN"></div>
</div>

<div id="complete" class="screen comp">
  <div class="ci" id="cI"></div>
  <h2 id="cT"></h2>
  <p id="cM"></p>
  <button onclick="home()">ホームに戻る</button>
</div>

<script>
const R={
night:{
  title:'夜ルーティン',icon:'\u{1F319}',
  done:'お疲れさま。副交感神経が優位になった状態。このまま呼吸を続けて、寝落ちしてOK。',
  steps:[
  // ── 足裏リリース ──
  {
    name:'足裏リリース（右足）',cat:'足裏リリース',sec:90,side:'R',
    prep:['ラクロスボール or テニスボール 1個','立つか、椅子に座る'],
    steps:[
      '床にボールを置く。<strong>右足の土踏まずのあたり</strong>にボールが来るように、足を乗せる。',
      '体重の<strong>3〜4割</strong>をボールにかける。全体重は乗せない。立っている場合は左足に体重を残す。座っている場合はそのままでOK。',
      'ボールを<strong>つま先側からかかと側へ、ゆっくり転がす</strong>。片道3〜4秒くらいのスピード。',
      '<strong>痛い箇所を見つけたら、そこで止めて20秒間じっとする</strong>。「イタ気持ちいい」くらいの圧で。激痛は強すぎ。',
      '止めている間も<strong>鼻でゆっくり呼吸</strong>を続ける。息を止めない。',
      '足裏の外側（小指側）も忘れずに。<strong>土踏まず → 外側 → 指の付け根</strong>の3エリアをまんべんなく。',
    ],
    feel:'足裏がじんわり温かくなる。終わった後に左右の足裏を比べると、右足の方が<strong>床をはっきり感じる</strong>はず。',
    warn:'ボールが逃げる場合はカーペットや薄いマットの上で。<strong>骨の上（かかとの真ん中など）は避ける</strong>。柔らかい筋肉の部分を狙う。',
    why:'足裏は全身の姿勢制御の「センサー」。ここをほぐすと、ハムストリングスの可動域が即座に5-10%改善する。',
  },
  {
    name:'足裏リリース（左足）',cat:'足裏リリース',sec:90,side:'L',
    steps:[
      '左足に切り替える。右足と同じ要領で、<strong>土踏まず → 外側 → 指の付け根</strong>を転がす。',
      '左足は<strong>アーチ（土踏まず）を重点的に</strong>。扁平足の改善にはここが最重要。',
      '痛い箇所で止めて20秒。鼻呼吸を続ける。',
      '最後に、左右の足裏を交互に踏み比べてみる。<strong>「床の感触がクリアになった」</strong>と感じたら成功。',
    ],
    feel:'左右とも足裏がポカポカして、<strong>地面をしっかり掴める感覚</strong>が出ていればOK。',
  },
  // ── フォームローリング ──
  {
    name:'ハムストリングス（右）',cat:'フォームローリング',sec:60,side:'R',
    prep:['フォームローラー 1本','床に座る'],
    steps:[
      '床に座って両脚を伸ばす。フォームローラーを<strong>右の太もも裏（お尻の少し下）</strong>の下に横向きに置く。',
      '両手を後ろについて体を支え、<strong>左脚は膝を曲げて床につける</strong>（楽な姿勢になる）。',
      'お尻を浮かせて、右太もも裏にローラーが当たるようにする。<strong>体重の5-6割</strong>をローラーにかける。',
      '<strong>お尻側から膝裏の手前まで</strong>、ゆっくり前後に転がす。片道4〜5秒。',
      '<strong>痛い箇所で止めて20秒</strong>。その間、足首をゆっくり左右に揺らすと周辺の筋膜もほぐれる。',
      '太ももの裏の<strong>真ん中 → やや外側 → やや内側</strong>の3ラインを意識する。体を少しひねるとラインが変わる。',
    ],
    feel:'「ズーン」と鈍い圧迫感。やっているうちに<strong>痛みが和らいで筋肉が柔らかくなる</strong>感覚。',
    warn:'<strong>膝裏の真上にローラーを当てない</strong>（神経が通っている）。膝裏の手前5cmで止める。痙攣したら圧を弱める。',
    why:'ハムストリングスが硬いと骨盤を後方に引っ張る（後傾の直接原因）。ほぐしながら呼吸すると可動域改善効果が20-30%増す。',
  },
  {
    name:'ハムストリングス（左）',cat:'フォームローリング',sec:60,side:'L',
    steps:[
      '左の太もも裏に切り替え。右脚を曲げて床につける。',
      '同じ要領で<strong>お尻側→膝裏手前</strong>をゆっくり転がす。',
      '痛い箇所で20秒ホールド。鼻でゆっくり呼吸。',
      '3ライン（真ん中・外側・内側）をまんべんなく。',
    ],
  },
  {
    name:'ふくらはぎ（右）',cat:'フォームローリング',sec:60,side:'R',
    steps:[
      '両脚を伸ばして座る。ローラーを<strong>右のふくらはぎ</strong>の下に置く。',
      '左脚は右脚の上に重ねると圧が増す。軽くしたい場合は横に置く。',
      '<strong>アキレス腱の上あたりから膝裏手前</strong>まで、ゆっくり転がす。',
      'ふくらはぎには3ライン：<strong>内側（すねの裏）→ 真ん中 → 外側</strong>。足を内向き・まっすぐ・外向きにして転がすとラインが変わる。',
      '痛い箇所で止め、<strong>足首をゆっくり上下に動かす</strong>（つま先を自分に向けたり、遠ざけたり）。これでさらに深くほぐれる。',
    ],
    feel:'「コリコリ」した箇所が見つかるはず。ほぐれると<strong>足首の動きが軽く</strong>なる。',
  },
  {
    name:'ふくらはぎ（左）',cat:'フォームローリング',sec:60,side:'L',
    steps:[
      '左ふくらはぎに切り替え。',
      '同じ要領で内側・真ん中・外側の3ラインを転がす。',
      '痛い箇所で足首を上下に動かしながらホールド。',
    ],
  },
  {
    name:'大殿筋（お尻）',cat:'フォームローリング',sec:60,side:'both',
    steps:[
      'ローラーの上に<strong>右のお尻</strong>を乗せる。右足首を左膝の上に載せる（4の字にする）。',
      '両手を後ろについて体を支える。<strong>お尻の一番盛り上がった部分</strong>にローラーが当たるように調整。',
      '前後にゆっくり小さく動かす。<strong>痛い箇所で20秒</strong>ホールド。',
      '左のお尻に切り替えて同様に。',
      '※ ラクロスボールに替えるとピンポイントで効く。お尻の筋肉は厚いのでボールの方が深く届く。',
    ],
    feel:'お尻の奥に「ズーン」と届く感覚。ここが緩むと<strong>股関節の可動域がグッと広がる</strong>。',
    warn:'尾骨（お尻の割れ目の一番下の骨）には当てない。',
  },
  // ── ストレッチ ──
  {
    name:'90/90ヒップストレッチ（右前）',cat:'ストレッチ',sec:30,side:'R',
    prep:['床に座る（マットがあればベスト）'],
    steps:[
      '<strong>床に座る</strong>。右脚を前に出して、<strong>膝を90°に曲げる</strong>。右のすねが自分の体の正面に来るように（体と平行）。',
      '左脚は<strong>体の左側に開いて、膝を90°に曲げる</strong>。左のすねは体と垂直に、後ろを向く。',
      '上から見ると<strong>両脚でカタカナの「ヒ」の字</strong>を描く形になる。',
      '背筋を伸ばしたまま、<strong>おへそを右すねに近づけるように上体を前に倒す</strong>。',
      '<strong>右のお尻の外側〜股関節の前面</strong>にストレッチ感が出ればOK。無理に深く倒さなくていい。',
      '呼吸は止めず、吐くたびに少しだけ深く倒れる。',
    ],
    feel:'右のお尻の横〜奥に<strong>じわっと伸びる感覚</strong>。痛みではなく「伸びている」感じ。',
    warn:'膝に痛みが出たら角度を緩める。<strong>股関節に痛みがある場合は無理せず浅い角度で</strong>。後ろ脚の膝が浮いてもOK。',
    why:'股関節の内旋・外旋可動域を同時に改善。骨盤の動きを正常化する。',

// ===== ENGINE =====
let rk=null,si=0,ti=null,rem=0,run=false,bi=null;
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function home(){stop();stopB();show('home')}
function go(k){rk=k;si=0;show('exercise');render()}

function render(){
  stop();stopB();
  const r=R[rk],s=r.steps[si],t=r.steps.length;
  document.getElementById('eHt').textContent=r.title;
  document.getElementById('eHp').textContent=`${si+1} / ${t}`;
  document.getElementById('ePf').style.width=`${((si+1)/t)*100}%`;
  rem=s.sec;run=false;

  const b=document.getElementById('eB');
  b.innerHTML='';b.scrollTop=0;

  // Header
  let h='';
  h+=`<div><div class="step-cat">${s.cat||''}</div><div style="display:flex;align-items:center;gap:10px;margin-top:4px"><span class="step-num">${si+1}</span><span class="step-name">${s.name}</span></div></div>`;
  h+=`<div style="display:flex;gap:8px;flex-wrap:wrap">`;
  h+=`<div class="step-time-badge">\u23F1 ${fmt(s.sec)}</div>`;
  if(s.side==='R')h+=`<div class="step-side R">右側</div>`;
  else if(s.side==='L')h+=`<div class="step-side L">左側</div>`;
  if(s.optional)h+=`<div class="step-side both" style="background:#fbbf2412;color:#fbbf24">スキップ可</div>`;
  h+=`</div>`;

  // Prep
  if(s.prep){
    h+=`<div class="prep-card"><h4>用意するもの</h4><ul class="prep-list">`;
    s.prep.forEach(p=>h+=`<li>${p}</li>`);
    h+=`</ul></div>`;
  }

  // Steps
  h+=`<div class="inst-card"><div class="inst-header"><span class="icon">&#128220;</span> やり方</div><div class="inst-content"><div class="num-steps">`;
  s.steps.forEach((st,i)=>h+=`<div class="num-step"><div class="num-circle">${i+1}</div><div class="num-text">${st}</div></div>`);
  h+=`</div></div></div>`;

  // Feel
  if(s.feel)h+=`<div class="tip-box feel"><span class="label">効いている感覚</span>${s.feel}</div>`;
  // Warn
  if(s.warn)h+=`<div class="tip-box warn"><span class="label">注意</span>${s.warn}</div>`;
  // Why
  if(s.why)h+=`<div class="tip-box why"><span class="label">なぜやるか</span>${s.why}</div>`;

  // Timer
  if(s.breathing){
    h+=`<div class="timer-card"><div class="breathe" id="bc">準備OK</div><div style="margin-top:16px"><div class="timer-num" id="td">${fmt(rem)}</div></div><div class="timer-btns"><button class="tbtn go" id="tb" onclick="tog()">スタート</button><button class="tbtn rst" onclick="rst()">リセット</button></div></div>`;
  }else{
    const c=2*Math.PI*85;
    h+=`<div class="timer-card"><div class="timer-ring"><svg viewBox="0 0 200 200"><circle class="trk" cx="100" cy="100" r="85"/><circle class="prg" id="tp" cx="100" cy="100" r="85" stroke-dasharray="${c}" stroke-dashoffset="0"/></svg><div class="tt"><div class="big" id="td">${fmt(rem)}</div><div class="sm" id="ts"></div></div></div><div class="timer-btns"><button class="tbtn go" id="tb" onclick="tog()">スタート</button><button class="tbtn rst" onclick="rst()">リセット</button></div></div>`;
  }

  b.innerHTML=h;

  // Nav
  const n=document.getElementById('eN');
  let nv='';
  if(si>0)nv+=`<button class="nbtn prev" onclick="prev()">&larr; 戻る</button>`;
  if(s.optional)nv+=`<button class="nbtn skip" onclick="next()">スキップ</button>`;
  nv+=`<button class="nbtn ${si===t-1?'fin':'next'}" onclick="next()">${si===t-1?'完了':'次へ &rarr;'}</button>`;
  n.innerHTML=nv;
}

function tog(){run?pause():start()}
function start(){
  run=true;
  const btn=document.getElementById('tb');if(btn)btn.textContent='一時停止';
  const s=R[rk].steps[si];
  if(s.breathing)startB();
  ti=setInterval(()=>{
    rem--;upd();
    if(rem<=0){stop();stopB();if(navigator.vibrate)navigator.vibrate([200,100,200]);const b=document.getElementById('tb');if(b){b.textContent='完了!';b.disabled=true}}
  },1000);
}
function pause(){run=false;clearInterval(ti);stopB();const b=document.getElementById('tb');if(b)b.textContent='再開'}
function stop(){run=false;clearInterval(ti);ti=null}
function rst(){stop();stopB();const s=R[rk].steps[si];rem=s.sec;upd();const b=document.getElementById('tb');if(b){b.textContent='スタート';b.disabled=false}}
function upd(){
  const d=document.getElementById('td');if(d)d.textContent=fmt(rem);
  const s=R[rk].steps[si];
  const p=document.getElementById('tp');
  if(p){const c=2*Math.PI*85;p.style.strokeDashoffset=c*(rem/s.sec)}
}

function startB(){
  const c=document.getElementById('bc');if(!c)return;
  let ph='in';c.className='breathe in';c.textContent='吸う';
  bi=setInterval(()=>{
    if(ph==='in'){ph='out';c.className='breathe out';c.textContent='吐く'}
    else{ph='in';c.className='breathe in';c.textContent='吸う'}
  },5000);
}
function stopB(){clearInterval(bi);bi=null}

function prev(){if(si>0){stop();stopB();si--;render()}}
function next(){stop();stopB();si++;if(si>=R[rk].steps.length){document.getElementById('cI').textContent=R[rk].icon;document.getElementById('cT').textContent=R[rk].title+' 完了';document.getElementById('cM').textContent=R[rk].done;show('complete')}else render()}
function fmt(s){if(s<0)s=0;return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}
</script>
